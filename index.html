<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind + Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- fontAwesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
         font-family: "Geist", sans-serif;
    }
</style>

</head>
<body class="bg-base-200 min-h-screen m-0">
    <div class="py-16">
    <fieldset class="fieldset bg-base-100 border-base-300 rounded-box w-xs sm:w-3/9 border p-4 mx-auto ">
 <div class="mx-auto text-center">
  <img class="mx-auto pb-6" src="assets/github-logo.png" alt="">
 <h2 class="text-2xl font-semibold pb-1">GitHub Issues Tracker</h2>
 <p class="text-gray-500">Sign in to manage your issues</p>
 </div>
  <label class="label text-base font-medium">Username</label>
  <input type="text" class="input w-full" placeholder="Enter Username" />
  <p class="text-sm text-blue-800">default:admin</p>

  <label class="label text-base font-medium">Password</label>
  <input type="password" class="input w-full" placeholder="Enter Password" />
  <p class="text-sm text-blue-800">default:admin123</p>

  <button class="btn btn-primary mt-4 mb-6">Sign in</button>
</fieldset>
</div>
</body>
</html>
