<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- Tailwind + Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- fontAwesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>
    *{
         font-family: "Geist", sans-serif;
    }
</style>
</head>
<!-- shadow-sm -->
<body class="bg-base-200 min-h-screen m-0">
    <header class="bg-white shadow-sm">
    <div class="flex items-center justify-between py-4 px-20">
  <div class="flex gap-1 items-center">
     <img class="h-9 w-9" src="assets/github-logo.png" alt="">
     <p class="text-2xl font-semibold">GitHub Issues Tracker</p>
  </div>
  <div class="flex gap-4 items-center">
  <div>
    <input  id="search" type="search" class="text-base text-[#64748B] py-2 px-4 rounded-sm  border-gray-300" placeholder="Search issues..">
  </div>
  <div>
    <button class="btn btn-primary font-semibold"><i class="fa-solid fa-plus"></i>New issue</button>
  </div>
  </div>
  </div>
    </header>

    <section>
    <div class="pt-14">
    <div class="w-8/10 mx-auto p-6 bg-white rounded-lg flex gap-2 justify-center flex-col items-center sm:flex-row sm:justify-start mb-4 drop-shadow-sm">
        <button id="all-btn" class="btn btn-outline w-[120px] h-10 text-white bg-[#4A00FF] border-[#E4E4E7]">All</button>
        <button id="open-btn" class="btn btn-outline w-[120px] h-10 text-[#64748B] border-[#E4E4E7]">Open</button>
        <button id="close-btn" class="btn btn-outline border-[#E4E4E7] w-[120px] h-10 text-[#64748B]">Closed</button>
    </div>
    </div>
    </section>
  <section class="w-8/10 mx-auto p-6 bg-white rounded-t-lg gap-2 justify-center  items-center border-b-2 border-gray-200">
    <div class="flex items-center justify-between">
        <div>
        <div class="flex items-center gap-2">
           <div>
            <img class="bg-[#ECE4FF] p-2 rounded-[50%]" src="assets/Aperture.png" alt="">
           </div>
           <div>
            <h1 class="text-xl font-semibold mb-1"><span id="total">0</span> Issues</h1>
            <p class="text-[#64748B]">Track and manage your project issues</p>
           </div>
        </div>
        </div>
        <div class=" flex gap-4">
            <div>
            <div class=" flex gap-1 items-center">
          <p class="w-3 h-3 bg-green-600 rounded-full"></p>
          <p class="font-medium">Open</p>
            </div>
            </div>
            <div>
            <div class=" flex gap-1 items-center">
          <p class="w-3 h-3 bg-purple-600 rounded-full"></p>
          <p class="font-medium">Closed</p>
            </div>
            </div>
        </div>
    </div>
  </section>
  <section class="w-8/10 mx-auto bg-[#FBFBFB] drop-shadow-sm rounded-b-lg p-6">
  <div id="card-spinner" class="flex items-center justify-center text-gray-500 hidden">
    <span class="loading loading-spinner loading-xl mx-auto"></span>
  </div>
  <div id="card-container" class="grid grid-cols-4 gap-1 space-y-2">
  </div>
  </section>

  <!-- Open the modal using ID.showModal() method -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="modal-spinner" class="flex items-center justify-center py-10 hidden">
      <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
    <div id="modal-container"></div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>


  <script src="scripts/home.js"></script>
</body>
</html>
